<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CppHttpd Server</title>
</head>
<body>
  <h1>CppHttpd/2.0 is running</h1>
  <p>My advanced C++ HTTP server is working successfully.</p>

  <h2>Available Endpoints</h2>
  <ul>
    <li>GET /health</li>
    <li>GET /users</li>
    <li>POST /users</li>
    <li>GET /users/:id</li>
    <li>DELETE /users/:id</li>
    <li>GET /echo?msg=hello</li>
  </ul>
</body>
</html>
